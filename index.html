<!DOCTYPE html>
<html lang="en">
<head>
  <link
href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Parisienne&display=swap"
rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>White Noon Tarot Project 2026</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">

  <div class="intro-content">

    <h1 id="intro-text">
      In every end, there is also a beginning.
    </h1>

    <div class="loading-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

</div>

  <div id="gallery-content">

  <header class="top-banner">
      <h1 id="banner-title">White Noon Tarot Project 2026</h1>
  </header>

  <main>

<section id="major-arcana">

  <button
    class="section-toggle"
    onclick="toggleSection('major-gallery', this)">

    Major Arcana
    <span class="toggle-icon">−</span>

  </button>

  <div id="major-gallery" class="gallery"></div>

</section>

<section id="minor-arcana">

  <button
    class="section-toggle"
    onclick="toggleSection('minor-gallery', this)">

    Minor Arcana
    <span class="toggle-icon">−</span>

  </button>

  <div id="minor-gallery" class="gallery"></div>

</section>

  </main>

  <div id="modal" class="modal hidden">

    <div class="modal-content fade-in">

      <button class="close-btn" onclick="closeModal()">×</button>

      <button class="nav-btn prev-btn" onclick="previousCard()">‹</button>
      <button class="nav-btn next-btn" onclick="nextCard()">›</button>

      <div class="modal-layout">

        <div class="modal-image">
            <img id="modal-card-image" src="">
        </div>

        <div class="modal-text">

          <div class="title-row">

          <span id="modal-card-name"></span>

          <span class="title-divider">|</span>

          <span id="modal-oc-name"></span>

          </div>

          <h2>Upright Meaning</h2>
          <div id="upright-tags" class="tags"></div>

          <h2>Reversal Meaning</h2>
          <div id="reversal-tags" class="tags"></div>

          <h2>Description</h2>
          <p id="modal-description"></p>

          <p class="artist" id="modal-artist"></p>

        </div>

      </div>

    </div>

  </div>

<audio id="bgm" loop>
  <source src="./music/bgm.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", async () => {

  const intro =
    document.getElementById("intro");

  const introText =
    document.getElementById("intro-text");

  const bgm =
    document.getElementById("bgm");

  await new Promise(resolve =>
    setTimeout(resolve, 4200)
  );

  bgm.load();

  await new Promise(resolve =>
    setTimeout(resolve, 800)
  );

  intro.classList.add("fade-out");

});
</script>

<script>
const bannerTitle =
document.getElementById("banner-title");

const majorArcana =
document.getElementById("major-arcana-title");

const minorArcana =
document.getElementById("minor-arcana-title");

window.addEventListener("scroll", () => {

  const majorRect =
  majorArcana.getBoundingClientRect();

  const minorRect =
  minorArcana.getBoundingClientRect();

  if (minorRect.top <= 80) {

    bannerTitle.textContent =
    "Minor Arcana";

  } else if (majorRect.top <= 80) {

    bannerTitle.textContent =
    "Major Arcana";

  } else {

    bannerTitle.textContent =
    "White Noon Tarot Project 2026";
  }
});

const topBanner =
document.querySelector(".top-banner");

window.addEventListener("scroll", () => {

  if (window.scrollY > 80) {

    topBanner.classList.add("collapsed");

  } else {

    topBanner.classList.remove("collapsed");
  }
});
</script>

<div class="floating-nav">

<button
  id="music-btn"
  class="nav-circle"
  type="button">
  BGM
</button>

  <button
    id="flip-all-btn"
    class="nav-circle"
    type="button">
    Flip
  </button>

  <a href="#major-arcana" class="nav-circle">
    Major
  </a>

  <a href="#minor-arcana" class="nav-circle">
    Minor
  </a>

</div>

  <script src="data.js"></script>
  <script src="script.js"></script>

</div>

</body>

</html>
